<div class="container my-5 text-white">
    <div class="text-center mb-5 pb-5">
      <h1 class="display-3 font-weight-bold">Actuellement au cinéma</h1>
      <p class="lead">Dernières sorties - {{ minDate | date:'dd/MM/yyyy' }}</p>
    </div>
  
    <div>
      <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
  
      <div class="row">
        <div *ngFor="let movie of movies" class="col-md-4 mb-4 text-center">
          <div class="card border-light bg-dark text-white shadow-sm">
            <img [src]="'https://image.tmdb.org/t/p/w500/' + movie.poster_path" 
                 class="card-img-top" 
                 alt="{{ movie.title }}">
            <div class="card-body">
              <h5 class="card-title">{{ movie.title }}</h5>
              <p class="card-text truncated-text">{{ movie.overview || "Aucune description n'a été fournie par l'API."}}</p>
              <a href="#" class="btn btn-primary">Voir Détails</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
