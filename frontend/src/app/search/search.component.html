<section class="search-page app-shell text-white">
  <div class="search-hero glass-panel">
    <p class="eyebrow">Recherche</p>
    <h1>Résultats pour "{{ searchQuery }}"</h1>
    <p>{{ films.length }} titre(s) trouvés</p>
  </div>

  <div *ngIf="films.length; else emptyState" class="poster-grid search-grid">
    <article *ngFor="let movie of films; trackBy: trackByMovieId" class="poster-card">
      <a [routerLink]="['/film', movie?.id]" class="search-card-link">
        <img
          [src]="movie?.poster_path ? 'https://image.tmdb.org/t/p/w500/' + movie?.poster_path : 'https://placehold.co/500x750?text=Aucun+poster+disponible'"
          alt="{{ movie?.title || 'Inconnu' }}"
        />
        <div class="search-overlay">
          <h2>{{ movie?.title || 'Titre inconnu' }}</h2>
          <p>{{ movie?.release_date | date : "yyyy" }}</p>
        </div>
      </a>
    </article>
  </div>

  <ng-template #emptyState>
    <div class="empty-state glass-panel">
      <h2>Aucun résultat pour le moment</h2>
      <p>Essayez un autre titre depuis la recherche rapide.</p>
    </div>
  </ng-template>
</section>
