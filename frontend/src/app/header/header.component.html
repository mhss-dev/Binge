<header
  class="header"
  [ngStyle]="{'background-image': 'url(https://image.tmdb.org/t/p/original/' + movie.backdrop_path + ')'}"
>
  <div class="overlay"></div>
  <div class="header-inner app-shell">
    <div class="hero-copy">
      <p class="eyebrow">Social movie tracker</p>
      <h1>Binge</h1>
      <p class="hero-text">
        Gardez un oeil sur les films que vous avez vus, ceux que vous voulez lancer ensuite, et ceux que vos amis recommandent.
      </p>

      <div class="hero-actions">
        <a routerLink="/films" class="hero-link primary">Explorer le catalogue</a>
        <a [routerLink]="['/film', movie?.id]" class="hero-link secondary featured-link">
          <span class="featured-kicker">En vedette</span>
          <strong>{{ movie?.title || 'Chargement...' }}</strong>
        </a>
      </div>

      <button class="scroll-hint" type="button" (click)="scrollTo('aucinema')" aria-label="Descendre">
        <i class="fas fa-arrow-down"></i>
      </button>
    </div>
  </div>
</header>
